---
# EDA Sample: Webhook Source → Run AAP Job Template
#
# This rulebook listens on port 5000 for HTTP POST events.
# When an event matching the condition arrives it fires the
# "EDA-Sample-Webhook-Handler" job template in AAP Controller.
#
# Activation name in AAP EDA:  "sample-webhook-activation"
# Test:
#   curl -X POST https://<eda-event-stream-url>/api/eda/v1/event-streams/<uuid>/ \
#        -H "Content-Type: application/json" \
#        -d '{"action":"hello","target":"world","version":"1.0.0"}'

- name: "Sample Webhook to Job Template"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    # Rule 1: Handle any valid payload
    - name: "Trigger playbook on any webhook event"
      condition: event.payload is defined
      action:
        run_job_template:
          name: "EDA-Sample-Webhook-Handler"
          organization: "Default"
          job_args:
            extra_vars:
              eda_event_action: "{{ event.payload.action | default('unknown') }}"
              eda_event_target: "{{ event.payload.target | default('all') }}"
              eda_event_version: "{{ event.payload.version | default('') }}"
              eda_event_raw: "{{ event.payload | to_json }}"
              eda_source_host: "{{ event.meta.headers.get('host', 'unknown') }}"

    # Rule 2: Debug rule — prints every event (useful during development)
    # Remove or disable in production
    - name: "Debug — log all events"
      condition: event.payload is defined
      action:
        debug:
          msg: >-
            [EDA-Sample] Event received:
            action={{ event.payload.action | default('?') }}
            target={{ event.payload.target | default('?') }}
