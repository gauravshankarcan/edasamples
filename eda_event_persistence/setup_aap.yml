---
# setup_aap.yml — Creates AAP objects for the event persistence demo (AAP 2.7+).
#
# Usage:
#   source ~/.bashrc_eda_session
#   export KUBECONFIG=~/.kube/config   # needed for Rule Engine credential
#   ansible-playbook eda_event_persistence/setup_aap.yml
#
# Environment (from ~/.bashrc_eda_session):
#   GITHUB_URL, GITHUB_TOKEN, AAP_BASE, AAP_TOKEN, AAP_PASS, KUBECONFIG
#
# Prerequisites:
#   - EDA-Samples project synced in EDA Controller
#   - EDA-Samples-Project synced in AAP Controller
#   - OpenShift access to read sovereign-aap-eda-postgres-configuration secret
#
# After setup, add the webhook hostname to /etc/hosts (CRC) and run:
#   bash testcases/30_event_persistence_restart_verify.sh

- name: "EDA Event Persistence Demo Setup"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_base: "{{ lookup('env', 'AAP_BASE') | default('https://aap-aap.apps-crc.testing', true) }}"
    aap_token: "{{ lookup('env', 'AAP_TOKEN') | default('', true) }}"
    aap_pass: "{{ lookup('env', 'AAP_PASS') }}"
    aap_user: "admin"
    eda_api: "{{ aap_base }}/api/eda/v1"
    ctrl_api: "{{ aap_base }}/api/controller/v2"
    git_repo_url: "{{ lookup('env', 'GITHUB_URL') | default('', true) }}"
    kubeconfig_path: "{{ lookup('env', 'KUBECONFIG') | default(lookup('env', 'HOME') + '/.kube/config', true) }}"
    openshift_context: "{{ lookup('env', 'OCP_CONTEXT') | default('crc-admin', true) }}"
    crc_admin_helper: "{{ lookup('env', 'HOME') }}/.crc/bin/crc-admin-helper-linux-amd64"
    eda_namespace: aap
    activation_name: eda-event-persistence-activation
    persistence_de_image: "registry.redhat.io/ansible-automation-platform-27/de-supported-rhel9:latest"
    persistence_de_name: "EDA-Persistence-DE"
    rule_engine_cred_name: "EDA-Rule-Engine-Credential"
    postgres_secret: aap-eda-postgres-configuration

  pre_tasks:
    - name: "Verify git_repo_url is set"
      ansible.builtin.assert:
        that: git_repo_url | length > 0
        fail_msg: "Set GITHUB_URL or pass -e git_repo_url=<url>"

  tasks:
    - name: "Get Controller project ID"
      ansible.builtin.uri:
        url: "{{ ctrl_api }}/projects/?name=EDA-Samples-Project"
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: false
      register: _ctrl_proj

    - name: "Get Controller inventory ID"
      ansible.builtin.uri:
        url: "{{ ctrl_api }}/inventories/?name=EDA-Sample-Inventory"
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: false
      register: _ctrl_inv

    - name: "Assert Controller prerequisites exist"
      ansible.builtin.assert:
        that:
          - _ctrl_proj.json.results | length > 0
          - _ctrl_inv.json.results | length > 0
        fail_msg: "Run aap_config/configure_aap.yml first to create Controller project/inventory"

    - name: "Sync Controller project for new playbook"
      ansible.builtin.uri:
        url: "{{ ctrl_api }}/projects/{{ _ctrl_proj.json.results[0].id }}/update/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: false
        status_code: [200, 201, 202]

    - name: "Wait for Controller project sync"
      ansible.builtin.uri:
        url: "{{ ctrl_api }}/projects/{{ _ctrl_proj.json.results[0].id }}/playbooks/"
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: false
      register: _proj_playbooks
      until: >-
        'eda_event_persistence/playbooks/persistence_action.yml'
        in (_proj_playbooks.json | default([]))
      retries: 30
      delay: 5

    - name: "Check for existing job template"
      ansible.builtin.uri:
        url: "{{ ctrl_api }}/job_templates/?name=EDA-Event-Persistence-Action"
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: false
      register: _jt_check

    - name: "Create EDA-Event-Persistence-Action job template"
      ansible.builtin.uri:
        url: "{{ ctrl_api }}/job_templates/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: false
        body_format: json
        body:
          name: "EDA-Event-Persistence-Action"
          description: "Long-running action for event persistence demo (AAP 2.7+)"
          job_type: run
          inventory: "{{ _ctrl_inv.json.results[0].id }}"
          project: "{{ _ctrl_proj.json.results[0].id }}"
          playbook: "eda_event_persistence/playbooks/persistence_action.yml"
          ask_variables_on_launch: true
        status_code: [200, 201]
      when: _jt_check.json.results | length == 0

    - name: "Get EDA project"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/?name=EDA-Samples"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_proj

    - name: "Sync EDA project to pick up new rulebook"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/{{ _eda_proj.json.results[0].id }}/sync/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 201, 202]
      when: _eda_proj.json.results | length > 0

    - name: "Wait for EDA rulebook import"
      ansible.builtin.uri:
        url: "{{ eda_api }}/rulebooks/?project_id={{ _eda_proj.json.results[0].id }}&name=eda-event-persistence.yml"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_rulebook
      until: _eda_rulebook.json.count | int > 0
      retries: 30
      delay: 5
      when: _eda_proj.json.results | length > 0

    - name: "Check for EDA-Persistence-DE"
      ansible.builtin.uri:
        url: "{{ eda_api }}/decision-environments/?name={{ persistence_de_name }}"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _de_check

    - name: "Create EDA-Persistence-DE (ansible-rulebook with --persistence-id support)"
      ansible.builtin.uri:
        url: "{{ eda_api }}/decision-environments/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "{{ persistence_de_name }}"
          description: "AAP 2.7 supported DE — required for enable_persistence"
          image_url: "{{ persistence_de_image }}"
          organization_id: 1
          pull_policy: always
        status_code: [200, 201, 400]
      when: _de_check.json.results | length == 0

    - name: "Read EDA Postgres password from cluster secret"
      ansible.builtin.command:
        argv:
          - oc
          - get
          - secret
          - "{{ postgres_secret }}"
          - -n
          - "{{ eda_namespace }}"
          - -o
          - jsonpath={.data.password}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: _pg_secret_b64
      changed_when: false
      failed_when: false

    - name: "Set Postgres connection facts from cluster"
      ansible.builtin.set_fact:
        pg_host: aap-postgres-15.aap.svc.cluster.local
        pg_port: "5432"
        pg_database: eda
        pg_user: eda
        pg_password: "{{ _pg_secret_b64.stdout | b64decode }}"
        pg_sslmode: prefer
      when: _pg_secret_b64.rc == 0 and _pg_secret_b64.stdout | length > 0
      no_log: true

    - name: "Check for existing Rule Engine credential"
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/?name={{ rule_engine_cred_name }}"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _re_cred_check
      when: pg_host is defined

    - name: "Create EDA Rule Engine credential"
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "{{ rule_engine_cred_name }}"
          description: "Postgres credential for Drools event persistence (AAP 2.7+)"
          credential_type_id: 28
          organization_id: 1
          inputs:
            postgres_db_host: "{{ pg_host }}"
            postgres_db_port: "{{ pg_port }}"
            postgres_db_name: "{{ pg_database }}"
            postgres_db_user: "{{ pg_user }}"
            postgres_db_password: "{{ pg_password }}"
            postgres_sslmode: "{{ pg_sslmode }}"
            deduplication_window_size: "5"
            primary_encryption_secret: "eda-persist-demo-key-2026"
        status_code: [200, 201, 400]
      register: _re_cred_create
      when:
        - pg_host is defined
        - _re_cred_check.json.results | default([]) | length == 0
      no_log: true

    - name: "Set Rule Engine credential ID"
      ansible.builtin.set_fact:
        rule_engine_credential_id: >-
          {{
            _re_cred_check.json.results[0].id
            if (_re_cred_check.json.results | default([]) | length > 0)
            else _re_cred_create.json.id
          }}
      when: pg_host is defined

    - name: "Create or update event persistence activation"
      ansible.eda.rulebook_activation:
        name: "{{ activation_name }}"
        description: "Event persistence demo — in-flight events survive restarts (AAP 2.7+)"
        project: "EDA-Samples"
        rulebook: "eda-event-persistence.yml"
        decision_environment: "{{ persistence_de_name }}"
        organization: "Default"
        enabled: true
        restart_policy: on-failure
        restart_on_project_update: true
        enable_persistence: true
        rule_engine_credential_id: "{{ rule_engine_credential_id | default(omit) }}"
        eda_credentials:
          - EDA-AAP-Controller-Credential
        k8s_service_name: "{{ activation_name }}"
        log_level: debug
        state: present
        controller_host: "{{ aap_base }}"
        controller_username: "{{ aap_user }}"
        controller_password: "{{ aap_pass }}"
        validate_certs: false
      when: rule_engine_credential_id is defined

    - name: "Verify enable_persistence is set"
      ansible.builtin.uri:
        url: "{{ eda_api }}/activations/?name={{ activation_name }}"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _activation_check
      when: rule_engine_credential_id is defined

    - name: "Assert persistence is enabled on activation"
      ansible.builtin.assert:
        that:
          - _activation_check.json.results | length > 0
          - _activation_check.json.results[0].enable_persistence | bool
        fail_msg: "Activation {{ activation_name }} missing or enable_persistence is false"
      when: rule_engine_credential_id is defined

    - name: "Create OCP Route on CRC cluster for webhook"
      ansible.builtin.shell: |
        export KUBECONFIG="{{ kubeconfig_path }}"
        oc --context="{{ openshift_context }}" apply -f - -n {{ eda_namespace }} <<'YAML'
        apiVersion: route.openshift.io/v1
        kind: Route
        metadata:
          name: {{ activation_name }}
        spec:
          host: {{ activation_name }}.apps-crc.testing
          to:
            kind: Service
            name: {{ activation_name }}
          port:
            targetPort: 5000
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        YAML
      register: _route_result
      changed_when: "'created' in _route_result.stdout or 'configured' in _route_result.stdout"
      when: rule_engine_credential_id is defined

    - name: "Register webhook hostname with CRC (apps-crc.testing)"
      ansible.builtin.command:
        argv:
          - "{{ crc_admin_helper }}"
          - add
          - "127.0.0.1"
          - "{{ activation_name }}.apps-crc.testing"
      register: _crc_hosts
      changed_when: "'added' in (_crc_hosts.stdout | default(''))"
      failed_when: false
      when: rule_engine_credential_id is defined

    - name: "Ensure webhook hostname resolves locally (CRC)"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: 'eda-event-persistence-activation\.apps-crc\.testing'
        line: "127.0.0.1 eda-event-persistence-activation.apps-crc.testing"
        state: present
      become: true

    - name: "Setup complete"
      ansible.builtin.debug:
        msg:
          - "Job template:     EDA-Event-Persistence-Action"
          - "Decision env:     {{ persistence_de_name }} (de-supported-rhel9 — required for persistence)"
          - "Rule engine cred: {{ rule_engine_cred_name }} (id={{ rule_engine_credential_id | default('?') }})"
          - "Activation:       {{ activation_name }}"
          - "Persistence:      enable_persistence=true"
          - "Webhook URL:      https://{{ activation_name }}.apps-crc.testing"
          - "CRC route:        oc --context={{ openshift_context }} get route {{ activation_name }} -n {{ eda_namespace }}"
          - "Note: enable_persistence requires EDA 2.7+ server image on CRC (current 2.6 fails with websocket 1011)"
          - "Test (webhook):   bash testcases/29_event_persistence_send.sh"
          - "Test (persist):   bash testcases/30_event_persistence_restart_verify.sh  # after EDA 2.7 upgrade"
