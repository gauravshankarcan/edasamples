---
# Local reference copy — AAP reads rulebooks/eda-event-persistence.yml
# See rulebooks/eda-event-persistence.yml for the activatable version.

- name: "EDA Event Persistence Demo"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Process event with persistence-backed job"
      condition: event.payload.event_type is defined
      action:
        run_job_template:
          name: "EDA-Event-Persistence-Action"
          organization: "Default"
          job_args:
            extra_vars:
              eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
              eda_event_type: "{{ event.payload.event_type }}"
              eda_sleep_seconds: "{{ event.payload.sleep_seconds | default(30) }}"
              eda_persistence_enabled: "{{ event.payload.persistence_enabled | default('true') }}"
              eda_requestor: "{{ event.payload.requestor | default('eda') }}"
