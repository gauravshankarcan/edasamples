---
# Playbook: persistence_action.yml — fires when the 3-in-10-minutes threshold is met
#
# The rule engine counted threshold-hit events in Drools facts; this playbook
# records that the persisted state crossed the threshold (often after a restart).

- name: "Event Persistence Demo: Threshold action"
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    eda_batch_id: "{{ eda_batch_id | default('no-batch') }}"
    eda_threshold_count: "{{ eda_threshold_count | default('?') }}"
    eda_window_started_at: "{{ eda_window_started_at | default('0') }}"
    eda_trigger_reason: "{{ eda_trigger_reason | default('threshold met') }}"

  tasks:
    - name: "Log threshold action"
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════"
          - "  THRESHOLD ACTION — Drools state preserved"
          - "  Batch ID:           {{ eda_batch_id }}"
          - "  Hits in window:     {{ eda_threshold_count }}"
          - "  Window started at:  {{ eda_window_started_at }} (unix)"
          - "  Reason:             {{ eda_trigger_reason }}"
          - "════════════════════════════════════════════"
