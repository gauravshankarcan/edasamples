---
# ── AAP Controller Configuration ─────────────────────────────────────────────
# Consumed by infra.aap_configuration.dispatch (controller roles section).
# Variable names exactly match what the dispatch role expects.

# ── Organizations ─────────────────────────────────────────────────────────────
aap_organizations:
  - name: Default
    description: "Default organization for EDA samples"

# ── Credentials ──────────────────────────────────────────────────────────────
controller_credentials:
  - name: EDA-GitHub-Credential
    description: "GitHub PAT for private repo clone (sourced from GITHUB_TOKEN)"
    organization: Default
    credential_type: Source Control
    inputs:
      username: "x-token"
      password: "{{ github_token }}"

  - name: EDA-AWS-Credential
    description: "AWS credentials for EC2 dynamic inventory and eda_param_limit_jobs sample"
    organization: Default
    credential_type: Amazon Web Services
    inputs:
      username: "{{ aws_access_key_id }}"
      password: "{{ aws_secret_access_key }}"

  - name: EDA-Azure-Credential
    description: "Azure Service Principal for Azure RM dynamic inventory and eda_param_limit_jobs Azure sample"
    organization: Default
    credential_type: Microsoft Azure Resource Manager
    inputs:
      subscription: "{{ azure_subscription_id }}"
      client: "{{ azure_client_id }}"
      secret: "{{ azure_secret }}"
      tenant: "{{ azure_tenant }}"

  - name: EDA-Vault-Credential
    description: "Ansible Vault password for decrypting eda_vault_demo/vars/vault.yml at runtime"
    organization: Default
    credential_type: Vault
    inputs:
      vault_password: "{{ vault_vault_password }}"

# ── Inventories ───────────────────────────────────────────────────────────────
controller_inventories:
  - name: EDA-Sample-Inventory
    description: "Static localhost inventory for EDA webhook-triggered playbooks"
    organization: Default

  - name: EDA-AWS-Dynamic-Inventory
    description: "AWS EC2 dynamic inventory for eda_param_limit_jobs — targets tagged instances"
    organization: Default

  - name: EDA-Azure-Inventory
    description: "Azure RM dynamic inventory for eda_param_limit_jobs Azure — targets tagged VMs"
    organization: Default

# ── Hosts (in static inventory) ───────────────────────────────────────────────
controller_hosts:
  - name: localhost
    inventory: EDA-Sample-Inventory
    variables:
      ansible_connection: local
      ansible_python_interpreter: "{{ '{{' }} ansible_playbook_python {{ '}}' }}"

# ── Inventory Sources (EC2 dynamic inventory) ─────────────────────────────────
controller_inventory_sources:
  - name: EDA-AWS-EC2-Source
    description: "AWS EC2 dynamic inventory source — discovers instances tagged Owner=eda-samples"
    inventory: EDA-AWS-Dynamic-Inventory
    source: ec2
    credential: EDA-AWS-Credential
    overwrite: true
    update_on_launch: true
    source_vars:
      regions:
        - us-east-1
      filters:
        "tag:Owner": "eda-samples"
      keyed_groups:
        - key: tags.Group
          prefix: ""
          separator: ""
        - key: tags.Group
          prefix: tag_Group_
          separator: ""
        - key: tags.Environment
          prefix: env_
          separator: ""
        - key: tags.Environment
          prefix: tag_Environment_
          separator: ""
        - key: tags.Role
          prefix: role_
          separator: ""
      hostnames:
        - tag:Name
        - private-ip-address
      compose:
        ansible_host: "public_ip_address | default(private_ip_address)"
        ansible_user: ec2-user

  - name: EDA-AzureRM-Source
    description: "Azure RM dynamic inventory source — discovers VMs tagged Owner=eda-samples"
    inventory: EDA-Azure-Inventory
    source: azure_rm
    credential: EDA-Azure-Credential
    overwrite: true
    update_on_launch: true
    source_vars:
      tags:
        Owner: "eda-samples"
      keyed_groups:
        - key: "tags.Group | default('')"
          prefix: ""
          separator: ""
        - key: "tags.Environment | default('')"
          prefix: "env_"
          separator: ""
        - key: "tags.Role | default('')"
          prefix: "role_"
          separator: ""
      default_host_filters:
        - "powerstate == 'running'"
      use_vm_name: true

# ── Projects ─────────────────────────────────────────────────────────────────
controller_projects:
  - name: EDA-Samples-Project
    description: "EDA samples — webhook, parameterized, limit jobs, requestor, regex"
    organization: Default
    scm_type: git
    scm_url: "{{ git_repo_url }}"
    scm_branch: main
    scm_credential: EDA-GitHub-Credential
    update_on_launch: false
    wait: true

# ── Job Templates ─────────────────────────────────────────────────────────────
controller_templates:

  - name: EDA-Sample-Webhook-Handler
    description: "Basic webhook sample — logs event fields and writes audit record"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "samples/playbooks/handle_event.yml"
    ask_variables_on_launch: true
    ask_limit_on_launch: true

  - name: EDA-Param-Deploy-Service
    description: "Parameterized deploy/rollback/scale/restart triggered by EDA webhook"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_param_samples/playbooks/parameterized_deploy.yml"
    ask_variables_on_launch: true
    ask_limit_on_launch: true

  - name: EDA-Limit-OS-Patching
    description: "OS patching / compliance check — runs only on hosts specified by EDA limit"
    job_type: run
    organization: Default
    inventory: EDA-AWS-Dynamic-Inventory
    project: EDA-Samples-Project
    playbook: "eda_param_limit_jobs/playbooks/limited_action.yml"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - EDA-EC2-SSH-Credential

  - name: EDA-Requestor-Handler
    description: "Processes incoming request and POSTs result back to callback_url"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_requestor/playbooks/handle_with_callback.yml"
    ask_variables_on_launch: true
    ask_limit_on_launch: true

  - name: EDA-Regex-Demo
    description: "CI/CD image tag router — is match/search in conditions, regex_replace in playbook"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_regex_samples/playbooks/process_with_regex.yml"
    ask_variables_on_launch: true
    ask_limit_on_launch: true

  - name: EDA-Azure-Limit-OS-Patching
    description: "OS patching / compliance check — runs on Azure VMs specified by EDA limit"
    job_type: run
    organization: Default
    inventory: EDA-Azure-Inventory
    project: EDA-Samples-Project
    playbook: "eda_param_limit_jobs/playbooks/limited_action.yml"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - EDA-Azure-Credential

  - name: EDA-Match-Multiple-Action-A
    description: "Action A for match_multiple_rules demo — logs event alpha fields"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_match_multiple/playbooks/action_a.yml"
    ask_variables_on_launch: true

  - name: EDA-Match-Multiple-Action-B
    description: "Action B for match_multiple_rules demo — logs event beta fields"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_match_multiple/playbooks/action_b.yml"
    ask_variables_on_launch: true

  - name: EDA-Execution-Strategy-Action
    description: "Long-running action for execution_strategy demo"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_execution_strategy/playbooks/slow_action.yml"
    ask_variables_on_launch: true

  - name: EDA-Event-Persistence-Action
    description: "Long-running action for event persistence demo (AAP 2.7+)"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_event_persistence/playbooks/persistence_action.yml"
    ask_variables_on_launch: true

  - name: EDA-Vault-Demo
    description: "Vault demo — playbook accesses vaulted secrets decrypted by EDA-Vault-Credential"
    job_type: run
    organization: Default
    inventory: EDA-Sample-Inventory
    project: EDA-Samples-Project
    playbook: "eda_vault_demo/playbooks/use_vaulted_secret.yml"
    ask_variables_on_launch: true
    credentials:
      - EDA-Vault-Credential
