# vault.yml — Ansible-Vault encrypted secrets for the EDA vault demo
#
# Vault ID     : default (no label)
# Encrypted by : ansible-vault encrypt_string
# Vault cred   : EDA-Vault-Credential (AAP Controller → Credentials)
# Local test   : ansible-vault decrypt --vault-password-file ~/.vault_pass_eda_demo
#
# To view decrypted values locally:
#   ansible -i localhost, localhost -m debug \
#     -a "msg={ '{' } vault_db_password { '}' }" \
#     -e @eda_vault_demo/vars/vault.yml \
#     --vault-password-file ~/.vault_pass_eda_demo \
#     -c local
#
# To add a new encrypted value:
#   ansible-vault encrypt_string 'MyNewSecret' --name my_var_name \
#     --vault-password-file ~/.vault_pass_eda_demo

