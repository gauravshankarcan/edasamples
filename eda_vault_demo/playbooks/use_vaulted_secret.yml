---
# Playbook: EDA Vault Demo — use Ansible-Vaulted variables
# Called by: EDA-Vault-Demo job template
# Triggered via: EDA rulebook eda-vault-demo.yml → webhook event
#
# What this demonstrates:
#   1. Inline vault strings (!vault) embedded in a vars file
#   2. A separate vault file loaded with include_vars
#   3. Using vaulted values safely (no plaintext in logs)
#   4. The difference between vault password sources:
#      - AAP Vault Credential  (production: stored in AAP Controller)
#      - --vault-password-file (local CLI testing)
#
# Extra vars passed from EDA rulebook:
#   eda_event_id     — unique event identifier
#   eda_event_action — action requested (report / rotate / verify)
#   eda_requestor    — who sent the event (free text)

- name: "EDA Vault Demo — access vaulted secrets triggered by webhook"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    # Load the encrypted vault file.
    # AAP Controller decrypts this at runtime using the attached
    # "EDA-Vault-Credential" (Vault Password credential type).
    - ../vars/vault.yml

  vars:
    eda_event_id: "{{ eda_event_id | default('EVT-MANUAL') }}"
    eda_event_action: "{{ eda_event_action | default('report') }}"
    eda_requestor: "{{ eda_requestor | default('eda') }}"

  tasks:
    - name: "Confirm vault file was loaded (vaulted vars are defined)"
      ansible.builtin.assert:
        that:
          - vault_db_password is defined
          - vault_api_key is defined
          - vault_smtp_password is defined
        fail_msg: >-
          vault.yml could not be loaded or decrypted.
          Ensure the 'EDA-Vault-Credential' vault credential is attached
          to the 'EDA-Vault-Demo' job template in AAP Controller.
        success_msg: "Vault loaded successfully — all expected secrets are present."

    - name: "Report — show that secrets are accessible (never log the values)"
      ansible.builtin.debug:
        msg: |
          ============================================================
          EDA Vault Demo — Event {{ eda_event_id }}
          Requested by: {{ eda_requestor }}
          Action: {{ eda_event_action }}
          ------------------------------------------------------------
          vault_db_password  : [REDACTED — length={{ vault_db_password | length }}]
          vault_api_key      : [REDACTED — first 4 chars={{ vault_api_key[:4] }}...]
          vault_smtp_password: [REDACTED — length={{ vault_smtp_password | length }}]
          vault_env_tag      : {{ vault_env_tag }}
          ============================================================
      when: eda_event_action == "report"

    - name: "Verify — confirm the DB password meets complexity rules"
      ansible.builtin.assert:
        that:
          - vault_db_password | length >= 16
          - vault_db_password | regex_search('[A-Z]')
          - vault_db_password | regex_search('[0-9]')
        fail_msg: "vault_db_password does NOT meet complexity requirements!"
        success_msg: "vault_db_password passes all complexity checks."
      when: eda_event_action == "verify"

    - name: "Rotate — simulate secret rotation (write new encrypted value to file)"
      ansible.builtin.debug:
        msg: >-
          [SIMULATE] In a real rotation workflow this task would:
          1. Generate a new random password.
          2. Update the secret in the target system (DB, API gateway, SMTP).
          3. Re-encrypt the new value with ansible-vault encrypt_string.
          4. Commit the updated vault.yml back to SCM via the AWX API.
          Rotation request acknowledged for event {{ eda_event_id }}.
      when: eda_event_action == "rotate"

    - name: "Record audit trail"
      ansible.builtin.debug:
        msg: >-
          [AUDIT] {{ eda_event_action | upper }} action completed
          for event {{ eda_event_id }} by {{ eda_requestor }}
          at {{ ansible_date_time.iso8601 | default(now(fmt='%Y-%m-%dT%H:%M:%SZ')) }}.
