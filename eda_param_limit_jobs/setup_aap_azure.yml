---
# setup_aap_azure.yml — Creates AAP objects for the EDA limit jobs demo with Azure inventory.
#
# Azure counterpart to setup_aap.yml (which configures AWS EC2 inventory).
#
# Usage:
#   source ~/.bashrc_eda_session
#   ansible-playbook eda_param_limit_jobs/setup_aap_azure.yml
#
# Environment (from ~/.bashrc_eda_session):
#   GITHUB_URL, GITHUB_TOKEN, AAP_BASE, AAP_TOKEN, AAP_PASS
#   CLIENT_ID, PASSWORD, TENANT, SUBSCRIPTION, RESOURCEGROUP

- name: "EDA Limit Jobs Setup — Azure Dynamic Inventory"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_base: "{{ lookup('env', 'AAP_BASE') | default('https://aap-aap.apps-crc.testing', true) }}"
    aap_token: "{{ lookup('env', 'AAP_TOKEN') | default('', true) }}"
    aap_pass: "{{ lookup('env', 'AAP_PASS') }}"
    aap_user: "admin"
    azure_client_id: "{{ lookup('env', 'CLIENT_ID') }}"
    azure_secret: "{{ lookup('env', 'PASSWORD') }}"
    azure_tenant: "{{ lookup('env', 'TENANT') }}"
    azure_subscription_id: "{{ lookup('env', 'SUBSCRIPTION') }}"
    azure_resource_group: "{{ lookup('env', 'RESOURCEGROUP') | default('eda-samples-rg', true) }}"
    eda_api: "{{ aap_base }}/api/eda/v1"
    git_repo_url: "{{ lookup('env', 'GITHUB_URL') | default('', true) }}"
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('', true) }}"

  pre_tasks:
    - name: "Verify required variables are set"
      ansible.builtin.assert:
        that:
          - git_repo_url | length > 0
          - azure_client_id | length > 0
          - azure_secret | length > 0
          - azure_tenant | length > 0
          - azure_subscription_id | length > 0
        fail_msg: >-
          Required variables missing.
          Source ~/.bashrc_eda_session before running.
          Required: GITHUB_URL, CLIENT_ID, PASSWORD, TENANT, SUBSCRIPTION

  tasks:
    # ── GitHub Source Control Credential ─────────────────────────────────────
    - name: "Create Controller Source Control credential for private repo"
      awx.awx.credential:
        name: "EDA-GitHub-Credential"
        description: "GitHub PAT for private repo clone"
        organization: Default
        credential_type: "Source Control"
        inputs:
          username: "x-token"
          password: "{{ github_token }}"
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      no_log: true
      when: github_token | length > 0

    # ── Step 1: Azure Credential ──────────────────────────────────────────────
    # AAP credential type "Microsoft Azure Resource Manager" accepts:
    #   subscription_id, client_id, secret, tenant
    - name: "Create Azure Resource Manager credential"
      awx.awx.credential:
        name: "EDA-Azure-Credentials"
        description: "Azure Service Principal for EDA limit demo"
        credential_type: "Microsoft Azure Resource Manager"
        organization: Default
        inputs:
          subscription: "{{ azure_subscription_id }}"
          client: "{{ azure_client_id }}"
          secret: "{{ azure_secret }}"
          tenant: "{{ azure_tenant }}"
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _azure_cred
      no_log: true

    # ── Step 2: Azure Dynamic Inventory ──────────────────────────────────────
    - name: "Create Azure dynamic inventory"
      awx.awx.inventory:
        name: "EDA-Azure-Inventory"
        description: "Dynamic Azure RM inventory for EDA limit demo"
        organization: Default
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _inv

    - name: "Get or create EDA-Samples-Project"
      awx.awx.project:
        name: "EDA-Samples-Project"
        scm_type: git
        scm_url: "{{ git_repo_url }}"
        scm_branch: main
        scm_update_on_launch: true
        scm_credential: "{{ 'EDA-GitHub-Credential' if github_token | length > 0 else omit }}"
        organization: Default
        wait: true
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false

    - name: "Configure Azure RM inventory source"
      awx.awx.inventory_source:
        name: "EDA-AzureRM-Source"
        inventory: EDA-Azure-Inventory
        # AAP inventory source type for Azure is "azure_rm"
        source: azure_rm
        credential: EDA-Azure-Credentials
        overwrite: true
        update_on_launch: true
        state: present
        source_vars:
          tags:
            Owner: "eda-samples"
          keyed_groups:
            - key: "tags.Group | default('')"
              prefix: ""
              separator: ""
            - key: "tags.Environment | default('')"
              prefix: "env_"
              separator: ""
            - key: "tags.Role | default('')"
              prefix: "role_"
              separator: ""
          default_host_filters:
            - "powerstate == 'running'"
          use_vm_name: true
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _inv_src

    - name: "Trigger Azure inventory sync"
      awx.awx.inventory_source_update:
        name: "EDA-AzureRM-Source"
        inventory: EDA-Azure-Inventory
        organization: Default
        wait: false
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      ignore_errors: true

    # ── Step 3: Localhost Inventory (fallback) ────────────────────────────────
    - name: "Ensure EDA-Sample-Inventory exists"
      awx.awx.inventory:
        name: "EDA-Sample-Inventory"
        description: "Localhost"
        organization: Default
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _local_inv

    - name: "Add localhost host to EDA-Sample-Inventory"
      awx.awx.host:
        name: localhost
        inventory: EDA-Sample-Inventory
        state: present
        variables:
          ansible_connection: local
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      when: _local_inv.changed
      ignore_errors: true

    # ── Step 4: Job Template ──────────────────────────────────────────────────
    - name: "Create job template EDA-Azure-Limit-OS-Patching"
      awx.awx.job_template:
        name: "EDA-Azure-Limit-OS-Patching"
        description: "EDA-triggered job with host limit support — Azure inventory"
        job_type: run
        inventory: EDA-Azure-Inventory
        project: EDA-Samples-Project
        playbook: "eda_param_limit_jobs/playbooks/limited_action.yml"
        ask_variables_on_launch: true
        ask_limit_on_launch: true
        credentials:
          - "EDA-Azure-Credentials"
        organization: Default
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _jt

    # ── Step 5: EDA Activation ────────────────────────────────────────────────
    - name: "Create EDA Source Control credential for private repo"
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "EDA-GitHub-SCM-Credential"
          description: "GitHub PAT for EDA project private repo clone"
          credential_type_id: 1
          organization_id: 1
          inputs:
            username: "x-token"
            password: "{{ github_token }}"
        status_code: [200, 201, 400]
      no_log: true
      when: github_token | length > 0

    - name: "Get EDA Source Control credential ID"
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/?name=EDA-GitHub-SCM-Credential"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_scm_cred
      when: github_token | length > 0

    - name: "Set EDA SCM credential ID"
      ansible.builtin.set_fact:
        eda_scm_cred_id: "{{ _eda_scm_cred.json.results[0].id }}"
      when: github_token | length > 0 and _eda_scm_cred.json.results | default([]) | length > 0

    - name: "Get EDA project"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/?name=EDA-Samples-EDA-Project"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_proj_check

    - name: "Create EDA project if missing"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body: >-
          {{
            {
              'name': 'EDA-Samples-EDA-Project',
              'url': git_repo_url,
              'organization_id': 1
            } | combine(
              {'eda_credential_id': eda_scm_cred_id}
              if (eda_scm_cred_id is defined)
              else {}
            )
          }}
        status_code: [200, 201]
      when: _eda_proj_check.json.results | length == 0
      ignore_errors: true

    - name: "Wait for EDA project sync"
      ansible.builtin.pause:
        seconds: 15
      when: _eda_proj_check.json.results | length == 0

    - name: "Re-fetch EDA project ID"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/?name=EDA-Samples-EDA-Project"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_proj

    - name: "Get Decision Environment ID"
      ansible.builtin.uri:
        url: "{{ eda_api }}/decision-environments/"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _de_list

    - name: "Create EDA activation for Azure limit jobs"
      ansible.builtin.uri:
        url: "{{ eda_api }}/activations/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "eda-azure-limit-jobs-activation"
          description: "Webhook with Azure VM limit — targeting by VM name or tag group"
          decision_environment_id: "{{ _de_list.json.results[0].id }}"
          project_id: "{{ _eda_proj.json.results[0].id }}"
          rulebook_rulesets: "rulebooks/eda-limit-jobs-azure.yml"
          organization_id: 1
          is_enabled: true
          log_level: debug
          k8s_service_name: "eda-azure-limit-jobs-activation"
        status_code: [200, 201, 400]
      register: _activation
      when:
        - _de_list.json.results | length > 0
        - _eda_proj.json.results | length > 0

    - name: "Setup complete summary"
      ansible.builtin.debug:
        msg:
          - "Job Template: EDA-Azure-Limit-OS-Patching"
          - "Azure Inventory: EDA-Azure-Inventory"
          - "EDA Activation: eda-azure-limit-jobs-activation"
          - "Next: Create Azure VMs with:"
          - "  ansible-playbook eda_param_limit_jobs/azure/create_test_vms.yml"
          - "Teardown with:"
          - "  ansible-playbook eda_param_limit_jobs/azure/teardown_vms.yml"
