---
# EDA Rulebook (AAP-activatable): Multiple-action behaviour demo
# Source: eda_match_multiple/rulebook_multi_match.yml
# Activation: eda-match-multiple-activation
#
# ONE event → MULTIPLE actions fire via the `actions:` (plural) syntax.
# This is the supported way in ansible-rulebook 1.x to trigger several
# job templates from a single incoming event without relying on the
# Drools-level match_multiple_rules flag.
#
# Test (sends ONE event, triggers TWO job templates simultaneously):
#   curl -k -X POST https://eda-match-multiple-activation.apps-crc.testing \
#     -H "Content-Type: application/json" \
#     -d '{
#       "event_type": "alert",
#       "severity": "critical",
#       "event_id": "EVT-001",
#       "message": "disk 95% full",
#       "notification_channel": "slack"
#     }'

- name: "EDA Multiple Actions — One Event Fires Both Action-A and Action-B"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Critical/high alert: trigger remediation AND notification"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      actions:
        - run_job_template:
            name: "EDA-Match-Multiple-Action-A"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Remediation-and-Notification"
        - run_job_template:
            name: "EDA-Match-Multiple-Action-B"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Remediation-and-Notification"
                eda_notification_channel: "{{ event.payload.notification_channel | default('slack') }}"

    - name: "Low/medium alert: log only (no remediation)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "low" or event.payload.severity == "medium")
      action:
        debug:
          msg: >-
            [LOW/MEDIUM] event_id={{ event.payload.event_id | default('?') }}
            severity={{ event.payload.severity }} — logged only, no job triggered.

    - name: "Any event: audit log"
      condition: event.payload.event_type is defined
      action:
        debug:
          msg: >-
            [AUDIT] event_id={{ event.payload.event_id | default('?') }}
            type={{ event.payload.event_type }}
            severity={{ event.payload.severity | default('none') }}
