---
# EDA Rulebook (AAP-activatable): Multiple-match behaviour demo
# Source: eda_match_multiple/rulebook_multi_match.yml
# Activation: eda-match-multiple-activation
#
# ONE event → MULTIPLE rules fire.
# See eda_match_multiple/README.md for full explanation.
#
# Test (sends ONE event, triggers TWO job templates):
#   curl -X POST https://eda-match-multiple-activation.apps-crc.testing \
#     -H "Content-Type: application/json" \
#     -d '{
#       "event_type": "alert",
#       "severity": "critical",
#       "event_id": "EVT-001",
#       "message": "disk 95% full",
#       "notification_channel": "slack"
#     }'

- name: "EDA Multiple Match — Overlapping Conditions, Both Rules Fire"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  vars:
    aap_organization: "Default"

  rules:
    - name: "Trigger remediation for critical/high severity"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      action:
        run_job_template:
          name: "EDA-Match-Multiple-Action-A"
          organization: "{{ vars.aap_organization }}"
          job_args:
            extra_vars:
              eda_event_type: "{{ event.payload.event_type }}"
              eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
              eda_severity: "{{ event.payload.severity }}"
              eda_triggered_rule: "Remediation-Rule-1"

    - name: "Send notification for critical/high severity"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      action:
        run_job_template:
          name: "EDA-Match-Multiple-Action-B"
          organization: "{{ vars.aap_organization }}"
          job_args:
            extra_vars:
              eda_event_type: "{{ event.payload.event_type }}"
              eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
              eda_severity: "{{ event.payload.severity }}"
              eda_triggered_rule: "Notification-Rule-2"
              eda_notification_channel: "{{ event.payload.notification_channel | default('slack') }}"

    - name: "Audit log for any event"
      condition: event.payload.event_type is defined
      action:
        debug:
          msg: >-
            [AUDIT] event_id={{ event.payload.event_id | default('?') }}
            type={{ event.payload.event_type }}
            severity={{ event.payload.severity | default('none') }}

    - name: "Throttled high-severity handler (once per 5 minutes)"
      condition: >
        event.payload.event_type is defined and
        event.payload.severity == "high"
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.payload.event_type
      action:
        debug:
          msg: >-
            [THROTTLED] high severity event — fires at most once/5min per event_type.
