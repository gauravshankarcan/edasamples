---
# EDA Rulebook (AAP-activatable): Multiple-action demo
# Activation: eda-match-multiple-activation
#
# ONE event → MULTIPLE job templates fired via `actions:` (plural) syntax.
# Both EDA-Match-Multiple-Action-A and EDA-Match-Multiple-Action-B
# are launched in sequence for the same critical/high severity event.
#
# Key: `actions:` (plural) lets a single rule execute multiple steps.
# Contrast with `action:` (singular) which can only run one step.
#
# Note: run_job_template waits for each job to complete before
# starting the next action in the list. For truly parallel execution
# across events, set execution_strategy: parallel at the activation level.
#
# Test (ONE event → Action-A then Action-B):
#   curl -k -X POST https://eda-match-multiple-activation.apps-crc.testing \
#     -H "Content-Type: application/json" \
#     -d '{
#       "event_type": "alert",
#       "severity": "critical",
#       "event_id": "EVT-MULTI-001",
#       "message": "critical alert — both Action-A and Action-B are triggered"
#     }'

- name: "EDA Multiple Actions — One Rule Fires Action-A then Action-B"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Critical/high: run remediation (Action-A) then notification (Action-B)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      actions:
        - run_job_template:
            name: "EDA-Match-Multiple-Action-A"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Multi-Action-Remediation"
        - run_job_template:
            name: "EDA-Match-Multiple-Action-B"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Multi-Action-Notification"

    - name: "Low/medium alert: log only"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "low" or event.payload.severity == "medium")
      action:
        debug:
          msg: >-
            [MULTI-MATCH] low/medium severity — no job triggered
            (only critical/high fires both Action-A and Action-B).
