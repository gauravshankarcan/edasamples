---
# EDA Sample: Job Template with 'limit' — Target Specific Hosts
# Inventory: AWS EC2 dynamic inventory (EDA-AWS-Inventory)
# Limit is passed from event payload as target_hosts
#
# Test:
#   curl -X POST <ACTIVATION-WEBHOOK-URL> \
#     -H "Content-Type: application/json" \
#     -d '{"action":"patching","target_hosts":"eda-test-web01","requestor":"ops-team","change_id":"CHG001"}'

- name: "EDA Job Template with Limit"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  vars:
    aap_organization: "Default"
    default_limit: "eda-test-hosts"

  rules:
    - name: "Trigger patching for specified hosts"
      condition: >
        event.payload.action == "patching" and
        event.payload.target_hosts is defined
      action:
        run_job_template:
          name: "EDA-Limit-OS-Patching"
          organization: "Default"
          job_args:
            limit: "{{ event.payload.target_hosts }}"
            extra_vars:
              param_action: "patching"
              param_requestor: "{{ event.payload.requestor | default('eda') }}"
              param_change_id: "{{ event.payload.change_id | default('') }}"
              eda_target_hosts: "{{ event.payload.target_hosts }}"

    - name: "Run compliance check on specified hosts"
      condition: >
        event.payload.action == "compliance_check" and
        event.payload.target_hosts is defined
      action:
        run_job_template:
          name: "EDA-Limit-OS-Patching"
          organization: "Default"
          job_args:
            limit: "{{ event.payload.target_hosts }}"
            extra_vars:
              param_action: "compliance_check"
              param_requestor: "{{ event.payload.requestor | default('eda') }}"
              param_change_id: "{{ event.payload.change_id | default('') }}"

    - name: "Restart service on specified hosts"
      condition: >
        event.payload.action == "restart_service" and
        event.payload.target_hosts is defined and
        event.payload.service_name is defined
      action:
        run_job_template:
          name: "EDA-Limit-OS-Patching"
          organization: "Default"
          job_args:
            limit: "{{ event.payload.target_hosts }}"
            extra_vars:
              param_action: "restart_service"
              param_service_name: "{{ event.payload.service_name }}"
              param_requestor: "{{ event.payload.requestor | default('eda') }}"

    - name: "Target by AWS tag"
      condition: >
        event.payload.action is defined and
        event.payload.aws_tag_key is defined and
        event.payload.aws_tag_value is defined
      action:
        run_job_template:
          name: "EDA-Limit-OS-Patching"
          organization: "Default"
          job_args:
            limit: "tag_{{ event.payload.aws_tag_key }}_{{ event.payload.aws_tag_value }}"
            extra_vars:
              param_action: "{{ event.payload.action }}"
              param_requestor: "{{ event.payload.requestor | default('eda') }}"
              eda_aws_filter: "tag_{{ event.payload.aws_tag_key }}_{{ event.payload.aws_tag_value }}"

    - name: "Reject events without target specification"
      condition: >
        event.payload.action is defined and
        event.payload.target_hosts is not defined and
        event.payload.aws_tag_key is not defined
      action:
        debug:
          msg: >-
            REJECTED: action='{{ event.payload.action }}' has no target_hosts or aws_tag_key.
            Refusing to run against ALL hosts without explicit limit.
