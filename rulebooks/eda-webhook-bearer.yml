---
# EDA Sample: Bearer-token authenticated webhook → Run AAP Job Template
#
# The ansible.eda.webhook source rejects requests without a valid
# Authorization: Bearer <token> header.
#
# Demo token (change in production): eda-bearer-demo-token
#
# Test:
#   curl -kv -X POST <ACTIVATION-WEBHOOK-URL> \
#     -H "Content-Type: application/json" \
#     -H "Authorization: Bearer eda-bearer-demo-token" \
#     -d '{"action":"deploy","target":"secure-host","version":"1.0.0"}'

- name: "Bearer-authenticated webhook to job template"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
        token: "eda-bearer-demo-token"

  rules:
    - name: "Trigger playbook on authenticated webhook event"
      condition: event.payload is defined
      action:
        run_job_template:
          name: "EDA-Sample-Webhook-Handler"
          organization: "Default"
          job_args:
            extra_vars:
              eda_event_action: "{{ event.payload.action | default('unknown') }}"
              eda_event_target: "{{ event.payload.target | default('all') }}"
              eda_event_version: "{{ event.payload.version | default('') }}"
              eda_event_raw: "{{ event.payload | string }}"
              eda_source_host: "{{ event.meta.headers.get('host', 'unknown') }}"
              eda_auth_mode: "bearer"

    - name: "Debug — log authenticated events"
      condition: event.payload is defined
      action:
        debug:
          msg: >-
            [EDA-Bearer] action={{ event.payload.action | default('?') }}
            target={{ event.payload.target | default('?') }}
