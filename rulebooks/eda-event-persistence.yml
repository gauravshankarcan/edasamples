---
# EDA Rulebook (AAP-activatable): Event persistence — Drools state preservation (AAP 2.7+)
# Activation: eda-event-persistence-activation  (enable_persistence: true)
#
# Use case: fire a Controller job only after 3 threshold-hit events (within a
# 10-minute window in production — tests send hits seconds apart).
# facts.threshold_count lives in Drools working memory; enable_persistence
# writes it to Postgres so a restart does not reset the count.
#
# Payload:
#   threshold-reset  — clear counter (start of each test run)
#   threshold-hit    — count one hit; include batch_id and hit_seq (1–3)
#
# Tests:
#   bash testcases/29_event_persistence_send.sh
#   bash testcases/30_event_persistence_restart_verify.sh

- name: "EDA Event Persistence — 3 hits threshold"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Manual reset (clear Drools facts)"
      condition: event.payload.event_type == "threshold-reset"
      actions:
        - retract_fact:
            fact:
              threshold_count: 3
            partial: true
        - retract_fact:
            fact:
              threshold_count: 2
            partial: true
        - retract_fact:
            fact:
              threshold_count: 1
            partial: true
        - retract_fact:
            fact:
              threshold_count: 0
            partial: true
        - set_fact:
            fact:
              threshold_count: 0
              last_batch_id: "{{ event.payload.batch_id | default('') }}"

    - name: "First threshold hit (count 0 → 1)"
      condition:
        all:
          - event.payload.event_type == "threshold-hit"
          - event.payload.hit_seq == 1
          - facts.threshold_count == 0
      actions:
        - retract_fact:
            fact:
              threshold_count: 0
            partial: true
        - set_fact:
            fact:
              threshold_count: 1
              last_batch_id: "{{ event.payload.batch_id | default('') }}"

    - name: "Second threshold hit (count 1 → 2)"
      condition:
        all:
          - event.payload.event_type == "threshold-hit"
          - event.payload.hit_seq == 2
          - facts.threshold_count == 1
      actions:
        - retract_fact:
            fact:
              threshold_count: 1
            partial: true
        - set_fact:
            fact:
              threshold_count: 2
              last_batch_id: "{{ event.payload.batch_id | default('') }}"

    - name: "Third threshold hit — trigger job (count 2 → 3)"
      condition:
        all:
          - event.payload.event_type == "threshold-hit"
          - event.payload.hit_seq == 3
          - facts.threshold_count == 2
      actions:
        - retract_fact:
            fact:
              threshold_count: 2
            partial: true
        - set_fact:
            fact:
              threshold_count: 3
              last_batch_id: "{{ event.payload.batch_id | default('') }}"
        - run_job_template:
            name: "EDA-Event-Persistence-Action"
            organization: "Default"
            job_args:
              extra_vars:
                eda_batch_id: "{{ event.payload.batch_id | default('') }}"
                eda_threshold_count: "3"
                eda_window_started_at: "0"
                eda_trigger_reason: "three threshold-hit events in window (state preserved across restarts)"
        - retract_fact:
            fact:
              threshold_count: 3
            partial: true
        - set_fact:
            fact:
              threshold_count: 0
              last_batch_id: ""
