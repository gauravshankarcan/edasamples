---
# setup_aap.yml — Creates AAP objects for the parameterized webhook sample.
#
# Usage:
#   ansible-playbook eda_param_samples/setup_aap.yml
#
# Environment (from ~/.bashrc_eda_session):
#   GITHUB_URL, GITHUB_TOKEN, AAP_BASE, AAP_TOKEN, AAP_PASS

- name: "EDA Parameterized Samples Setup"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_base: "{{ lookup('env', 'AAP_BASE') | default('https://aap-aap.apps-crc.testing', true) }}"
    aap_token: "{{ lookup('env', 'AAP_TOKEN') | default('', true) }}"
    aap_pass: "{{ lookup('env', 'AAP_PASS') }}"
    aap_user: "admin"
    eda_api: "{{ aap_base }}/api/eda/v1"
    git_repo_url: "{{ lookup('env', 'GITHUB_URL') | default('', true) }}"
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('', true) }}"

  pre_tasks:
    - name: "Verify git_repo_url is set"
      ansible.builtin.assert:
        that: git_repo_url | length > 0
        fail_msg: "Set GITHUB_URL environment variable or pass -e git_repo_url=<url>"

  tasks:
    - name: "Create Controller Source Control credential for private repo"
      awx.awx.credential:
        name: "EDA-GitHub-Credential"
        description: "GitHub PAT for private repo clone"
        organization: Default
        credential_type: "Source Control"
        inputs:
          username: "x-token"
          password: "{{ github_token }}"
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      no_log: true
      when: github_token | length > 0

    - name: "Get or create EDA-Sample-Inventory"
      awx.awx.inventory:
        name: "EDA-Sample-Inventory"
        description: "Localhost for EDA samples"
        organization: Default
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _inv

    - name: "Add localhost host to inventory"
      awx.awx.host:
        name: localhost
        inventory: EDA-Sample-Inventory
        state: present
        variables:
          ansible_connection: local
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      when: _inv.changed
      ignore_errors: true

    - name: "Get or create EDA-Samples-Project"
      awx.awx.project:
        name: "EDA-Samples-Project"
        scm_type: git
        scm_url: "{{ git_repo_url }}"
        scm_branch: main
        scm_update_on_launch: true
        scm_credential: "{{ 'EDA-GitHub-Credential' if github_token | length > 0 else omit }}"
        organization: Default
        wait: true
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _proj

    - name: "Create job template EDA-Param-Deploy-Service"
      awx.awx.job_template:
        name: "EDA-Param-Deploy-Service"
        description: "Parameterized service action triggered by EDA"
        job_type: run
        inventory: EDA-Sample-Inventory
        project: EDA-Samples-Project
        playbook: "eda_param_samples/playbooks/parameterized_deploy.yml"
        ask_variables_on_launch: true
        extra_vars:
          param_action: "unknown"
          param_service: "unknown"
          param_environment: "staging"
          param_version: ""
          param_requestor: "eda-automation"
        organization: Default
        state: present
        controller_host: "{{ aap_base }}"
        controller_oauthtoken: "{{ aap_token }}"
        validate_certs: false
      register: _jt

    - name: "Create EDA Source Control credential for private repo"
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "EDA-GitHub-SCM-Credential"
          description: "GitHub PAT for EDA project private repo clone"
          credential_type_id: 1
          organization_id: 1
          inputs:
            username: "x-token"
            password: "{{ github_token }}"
        status_code: [200, 201, 400]
      no_log: true
      when: github_token | length > 0

    - name: "Get EDA Source Control credential ID"
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/?name=EDA-GitHub-SCM-Credential"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_scm_cred
      when: github_token | length > 0

    - name: "Set EDA SCM credential ID"
      ansible.builtin.set_fact:
        eda_scm_cred_id: "{{ _eda_scm_cred.json.results[0].id }}"
      when: github_token | length > 0 and _eda_scm_cred.json.results | default([]) | length > 0

    - name: "Get EDA project"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/?name=EDA-Samples-EDA-Project"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_proj_check

    - name: "Create EDA project if missing"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body: >-
          {{
            {
              'name': 'EDA-Samples-EDA-Project',
              'url': git_repo_url,
              'organization_id': 1
            } | combine(
              {'eda_credential_id': eda_scm_cred_id}
              if (eda_scm_cred_id is defined)
              else {}
            )
          }}
        status_code: [200, 201]
      when: _eda_proj_check.json.results | length == 0
      ignore_errors: true

    - name: "Wait for EDA project sync"
      ansible.builtin.pause:
        seconds: 15
      when: _eda_proj_check.json.results | length == 0

    - name: "Re-fetch EDA project ID"
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/?name=EDA-Samples-EDA-Project"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _eda_proj

    - name: "Get Decision Environment ID"
      ansible.builtin.uri:
        url: "{{ eda_api }}/decision-environments/"
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
      register: _de_list

    - name: "Create EDA activation for param samples"
      ansible.builtin.uri:
        url: "{{ eda_api }}/activations/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "eda-param-samples-activation"
          description: "Parameterized webhook extra vars demo"
          decision_environment_id: "{{ _de_list.json.results[0].id }}"
          project_id: "{{ _eda_proj.json.results[0].id }}"
          rulebook_rulesets: "eda_param_samples/rulebook.yml"
          organization_id: 1
          is_enabled: true
          log_level: debug
        status_code: [200, 201, 400]
      register: _activation
      when:
        - _de_list.json.results | length > 0
        - _eda_proj.json.results | length > 0

    - name: "Setup complete summary"
      ansible.builtin.debug:
        msg:
          - "Job Template: EDA-Param-Deploy-Service"
          - "EDA Activation: eda-param-samples-activation"
          - "Test:"
          - "  curl -X POST <WEBHOOK_URL> -H 'Content-Type: application/json'"
          - "    -d '{\"action\":\"deploy\",\"service\":\"my-app\",\"version\":\"1.0.0\",\"requestor\":\"you\"}'"
