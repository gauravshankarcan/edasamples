---
# EDA Rulebook: Multiple-action demo — ONE event fires MULTIPLE job templates
#
# Key concept: Use `actions:` (plural) to execute two job templates
# from a single matching rule. This is the reliable method in
# ansible-rulebook 1.x to demonstrate "multi-match" behaviour.
#
# Compare with rulebook_single_match.yml which uses `action:` (singular)
# and only one template fires per event.
#
# Architecture:
#   webhook event → Rule 1 (critical/high) → Action-A + Action-B (simultaneous)
#                → Rule 2 (low/medium)     → debug only
#                → Rule 3 (any)            → audit debug (only fires if event
#                                             not matched by rules above)
#
# Test:
#   curl -k -X POST https://eda-match-multiple-activation.apps-crc.testing \
#     -H "Content-Type: application/json" \
#     -d '{
#       "event_type": "alert",
#       "severity": "critical",
#       "event_id": "EVT-MULTI-001",
#       "message": "critical alert — both Action-A and Action-B fire",
#       "notification_channel": "slack"
#     }'

- name: "EDA Multiple Actions — One Event Fires Both Action-A and Action-B"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    # ── Rule 1: Critical/high severity ──────────────────────────────────────
    # Both job templates run from a SINGLE rule via `actions:` (plural).
    # This is the supported way to fire multiple templates for one event.
    - name: "Critical/high alert: trigger remediation AND notification"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      actions:
        - run_job_template:
            name: "EDA-Match-Multiple-Action-A"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Remediation-and-Notification"
        - run_job_template:
            name: "EDA-Match-Multiple-Action-B"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Remediation-and-Notification"
                eda_notification_channel: "{{ event.payload.notification_channel | default('slack') }}"

    # ── Rule 2: Low/medium severity (exclusive of Rule 1) ───────────────────
    # Only fires for low/medium since Rule 1 already consumed critical/high.
    - name: "Low/medium alert: log only (no remediation)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "low" or event.payload.severity == "medium")
      action:
        debug:
          msg: >-
            [LOW/MEDIUM] event_id={{ event.payload.event_id | default('?') }}
            severity={{ event.payload.severity }} — logged only, no job triggered.

    # ── Rule 3: Audit (catch-all for events not matched by rules above) ──────
    - name: "Any event: audit log"
      condition: event.payload.event_type is defined
      action:
        debug:
          msg: >-
            [AUDIT] event_id={{ event.payload.event_id | default('?') }}
            type={{ event.payload.event_type }}
            severity={{ event.payload.severity | default('none') }}
