---
# EDA Rulebook: Multiple-match demo — TWO rulesets share one source
#
# CONCEPT: In ansible-rulebook, each ruleset in an activation receives
# an independent copy of every event from shared sources. This provides
# reliable "multi-match" behaviour: ONE webhook event triggers
# BOTH Action-A (remediation) AND Action-B (notification) simultaneously.
#
# Contrast with rulebook_single_match.yml where a single ruleset with
# mutually exclusive conditions ensures only ONE rule fires per event.
#
# Architecture:
#   webhook POST → ansible.eda.webhook (shared source)
#                     ├─ Ruleset-A evaluates independently → Action-A
#                     └─ Ruleset-B evaluates independently → Action-B
#
# The rulesets run in parallel — there is no dependency between them.
# Ruleset-A does not block Ruleset-B from processing the same event.
#
# Test:
#   curl -k -X POST https://eda-match-multiple-activation.apps-crc.testing \
#     -H "Content-Type: application/json" \
#     -d '{
#       "event_type": "alert",
#       "severity": "critical",
#       "event_id": "EVT-MULTI-001",
#       "message": "critical alert — both rulesets fire for this one event"
#     }'

- name: "Ruleset-A: Remediation — fires Action-A for critical/high severity"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Critical/high: run remediation (EDA-Match-Multiple-Action-A)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      action:
        run_job_template:
          name: "EDA-Match-Multiple-Action-A"
          organization: "Default"
          job_args:
            extra_vars:
              eda_event_type: "{{ event.payload.event_type }}"
              eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
              eda_severity: "{{ event.payload.severity }}"
              eda_triggered_ruleset: "Ruleset-A"

    - name: "Low/medium: log only (no remediation)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "low" or event.payload.severity == "medium")
      action:
        debug:
          msg: >-
            [RULESET-A] low/medium severity — no remediation triggered.

- name: "Ruleset-B: Notification — fires Action-B for critical/high severity"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Critical/high: run notification (EDA-Match-Multiple-Action-B)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      action:
        run_job_template:
          name: "EDA-Match-Multiple-Action-B"
          organization: "Default"
          job_args:
            extra_vars:
              eda_event_type: "{{ event.payload.event_type }}"
              eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
              eda_severity: "{{ event.payload.severity }}"
              eda_triggered_ruleset: "Ruleset-B"

    - name: "Low/medium: audit log"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "low" or event.payload.severity == "medium")
      action:
        debug:
          msg: >-
            [RULESET-B] low/medium severity — notification not required.
