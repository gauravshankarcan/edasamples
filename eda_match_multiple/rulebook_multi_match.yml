---
# EDA Rulebook: Multiple-action demo — one rule, multiple job templates
#
# CONCEPT: Use `actions:` (plural) to run multiple job templates
# from a single matching rule. This is the reliable way in
# ansible-rulebook 1.x to trigger several jobs from one event.
#
# Behaviour:
#   critical/high event → Rule fires → Action-A runs first
#                                     → then Action-B runs (sequential)
#
# Note: run_job_template waits for the first job to complete before
# starting the second. For truly parallel event handling, combine this
# with execution_strategy: parallel at the activation level.
#
# Compare with rulebook_single_match.yml which fires only ONE job per event.
#
# Test:
#   curl -k -X POST https://eda-match-multiple-activation.apps-crc.testing \
#     -H "Content-Type: application/json" \
#     -d '{
#       "event_type": "alert",
#       "severity": "critical",
#       "event_id": "EVT-MULTI-001",
#       "message": "critical alert — Action-A then Action-B will both fire"
#     }'

- name: "EDA Multiple Actions — One Rule Fires Action-A then Action-B"
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    # ── Rule 1: Both Action-A and Action-B fire for critical/high ────────────
    - name: "Critical/high: run remediation (A) then notification (B)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "critical" or event.payload.severity == "high")
      actions:
        - run_job_template:
            name: "EDA-Match-Multiple-Action-A"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Multi-Action-Remediation"
        - run_job_template:
            name: "EDA-Match-Multiple-Action-B"
            organization: "Default"
            job_args:
              extra_vars:
                eda_event_type: "{{ event.payload.event_type }}"
                eda_event_id: "{{ event.payload.event_id | default('no-id') }}"
                eda_severity: "{{ event.payload.severity }}"
                eda_triggered_rule: "Multi-Action-Notification"

    # ── Rule 2: Only debug for low/medium (single action) ───────────────────
    - name: "Low/medium: log only (no job triggered)"
      condition: >
        event.payload.event_type is defined and
        (event.payload.severity == "low" or event.payload.severity == "medium")
      action:
        debug:
          msg: >-
            [MULTI-MATCH] low/medium severity — no job launched.
            Contrast: a critical/high event would trigger BOTH Action-A and Action-B.
