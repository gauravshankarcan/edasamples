---
# Action B — match_multiple_rules demo
# This playbook is triggered ONLY in the multi-match rulebook (not in single-match),
# demonstrating that additional rules fired for the same event.

- name: "Match-Multiple Demo: Action B"
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: "Log Action B execution"
      ansible.builtin.debug:
        msg:
          - "════════ ACTION B FIRED ════════"
          - "  Event type:    {{ eda_event_type | default('unknown') }}"
          - "  Event ID:      {{ eda_event_id | default('no-id') }}"
          - "  Severity:      {{ eda_severity | default('info') }}"
          - "  Triggered by:  {{ eda_triggered_rule | default('Action-B') }}"
          - "  Notify via:    {{ eda_notification_channel | default('slack') }}"
          - "  *** This job only fires in match-multiple mode ***"
          - "═══════════════════════════════"

    - name: "Simulate Action B work (notification send)"
      ansible.builtin.debug:
        msg: "Would send {{ eda_severity | default('info') }} alert for {{ eda_event_type | default('unknown') }} to {{ eda_notification_channel | default('slack') }}"

    - name: "Summary"
      ansible.builtin.debug:
        msg: "Action B (notification) complete for event {{ eda_event_id | default('no-id') }}"
